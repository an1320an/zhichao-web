<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>邀请 · 知潮</title>
<meta name="description" content="你的朋友邀请你一起用知潮备考。" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; background: linear-gradient(160deg, #eaf4ee 0%, #f4f8f6 100%); color: #1f2d27; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 20px; padding: 32px 24px; max-width: 380px; width: 100%; box-shadow: 0 12px 40px rgba(47,125,97,0.12); text-align: center; }
  .logo { font-size: 22px; font-weight: 800; color: #2f7d61; }
  .lead { font-size: 15px; color: #4a5b54; margin-top: 14px; line-height: 1.6; }
  .code-label { font-size: 12px; color: #899490; margin-top: 24px; letter-spacing: 1px; }
  .code-row { display: flex; align-items: stretch; gap: 8px; margin-top: 6px; }
  .code { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; font-size: clamp(22px, 7.5vw, 30px); font-weight: 800; letter-spacing: 3px; color: #1f2d27; background: #f4f8f6; border-radius: 12px; padding: 14px 10px; overflow-wrap: anywhere; }
  .code.empty { font-size: 13px; font-weight: 600; letter-spacing: 0; line-height: 1.45; }
  .copy-btn { flex: 0 0 68px; border: 0; border-radius: 12px; background: #e4eee8; color: #2f7d61; font: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
  .copy-btn:active { opacity: .72; }
  .copy-btn:disabled { cursor: default; opacity: .5; }
  .btn { display: block; margin-top: 22px; background: #2f7d61; color: #fff; text-decoration: none; font-weight: 700; font-size: 16px; padding: 14px; border-radius: 12px; }
  .btn:active { opacity: .85; }
  .hint { font-size: 12.5px; color: #899490; margin-top: 16px; line-height: 1.6; }
  .foot { font-size: 11px; color: #b0bdb8; margin-top: 18px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🌱 槐序 · 知潮</div>
    <p class="lead">你的朋友邀请你一起用 <b>知潮</b> 备考——题库、复习与轻养成结合的学习工具。</p>
    <p class="hint" style="margin-top:10px;">📚 朵朵采用规则与云端 AI 双引擎：计划、提醒、题库抽题等确定性功能优先由规则和数据库处理；其他对话在你开启“内测 AI 数据授权”后可由 DeepSeek 生成，并统一经过安全审核。本服务仅面向年满 18 周岁的邀请内测用户。</p>
    <div class="code-label">你的邀请码</div>
    <div class="code-row">
      <div class="code" id="code">—</div>
      <button class="copy-btn" id="copy-code" type="button" aria-label="复制邀请码">复制</button>
    </div>
    <a class="btn" href="/download/zhichao-mobile-release.apk?v=1.6.6">下载知潮 Android 版</a>
    <p class="hint">已有知潮账号可直接登录并继续使用云端数据；新用户安装后可在<b>注册页</b>填入上面的邀请码。</p>
    <p class="foot">邀请码仅用于邀请注册，请勿倒卖。本页面不会收集你的任何个人信息。未满 18 周岁请勿下载注册。</p>
  </div>
  <script>
    var code = (new URLSearchParams(location.search).get("code") || "").trim();
    var codeElement = document.getElementById("code");
    var copyButton = document.getElementById("copy-code");
    codeElement.textContent = code || "未提供邀请码，请向邀请人索取";
    if (!code) {
      codeElement.classList.add("empty");
      copyButton.disabled = true;
      copyButton.textContent = "不可复制";
    }
    document.title = code ? ("邀请码 " + code + " · 知潮") : document.title;

    function legacyCopy(text) {
      var input = document.createElement("textarea");
      input.value = text;
      input.setAttribute("readonly", "");
      input.style.position = "fixed";
      input.style.opacity = "0";
      document.body.appendChild(input);
      input.select();
      input.setSelectionRange(0, input.value.length);
      var copied = document.execCommand("copy");
      document.body.removeChild(input);
      if (!copied) throw new Error("copy command was rejected");
    }

    copyButton.addEventListener("click", async function () {
      if (!code) return;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(code);
        } else {
          legacyCopy(code);
        }
        copyButton.textContent = "已复制";
      } catch (error) {
        copyButton.textContent = "复制失败";
      }
      window.setTimeout(function () {
        copyButton.textContent = "复制";
      }, 1600);
    });
  </script>
</body>
</html>
